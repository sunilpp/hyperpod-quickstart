---
# NCCL All-Reduce benchmark for HyperPod EKS clusters.
# Based on: https://awslabs.github.io/ai-on-sagemaker-hyperpod/docs/eks-orchestration/validation-and-testing/performance-testing/nccl-tests
#
# Usage:
#   kubectl apply -f nccl-test-mpijob.yaml
#   kubectl logs -f $(kubectl get pods -l job-name=nccl-tests -o name | grep launcher)
#   kubectl delete mpijob nccl-tests
#
# Customize:
#   - WORKER_REPLICAS: number of worker nodes
#   - GPUS_PER_NODE: GPUs per worker (match instance type)
#   - INSTANCE_TYPE: node selector for instance type
#   - EFA_ADAPTERS: EFA adapters per node (32 for p5, 4 for g5)
#   - IMAGE: container image with NCCL tests pre-built

apiVersion: kubeflow.org/v2beta1
kind: MPIJob
metadata:
  name: nccl-tests
spec:
  runPolicy:
    cleanPodPolicy: Running
    backoffLimit: 20
  slotsPerWorker: 1  # Adjust to match GPUs per node
  mpiReplicaSpecs:
    Launcher:
      replicas: 1
      template:
        spec:
          restartPolicy: OnFailure
          containers:
          - image: public.ecr.aws/hpc-cloud/nccl-tests:latest
            imagePullPolicy: IfNotPresent
            name: nccl-launcher
            env:
            - name: PATH
              value: $PATH:/opt/amazon/efa/bin:/usr/bin
            - name: LD_LIBRARY_PATH
              value: /opt/amazon/openmpi/lib:/opt/nccl/build/lib:/opt/amazon/efa/lib:/opt/amazon/ofi-nccl/lib/x86_64-linux-gnu:/usr/local/nvidia/lib:$LD_LIBRARY_PATH
            command:
            - /opt/amazon/openmpi/bin/mpirun
            - --allow-run-as-root
            - --tag-output
            - -np
            - "2"         # Total GPUs (WORKER_REPLICAS * GPUS_PER_NODE)
            - -N
            - "1"         # GPUs per node
            - --bind-to
            - none
            - -x
            - PATH
            - -x
            - LD_LIBRARY_PATH
            - -x
            - FI_PROVIDER=efa
            - -x
            - FI_EFA_FORK_SAFE=1
            - -x
            - NCCL_DEBUG=INFO
            - -x
            - NCCL_BUFFSIZE=8388608
            - -x
            - NCCL_P2P_NET_CHUNKSIZE=524288
            - -x
            - NCCL_TUNER_PLUGIN=/opt/amazon/ofi-nccl/lib/x86_64-linux-gnu/libnccl-ofi-tuner.so
            - --mca
            - pml
            - ^ucx
            - --mca
            - btl
            - tcp,self
            - --mca
            - btl_tcp_if_exclude
            - lo,docker0,veth_def_agent
            - /opt/nccl-tests/build/all_reduce_perf
            - -b
            - "8"
            - -e
            - "16G"     # Use 128M for quick test, 16G for full benchmark
            - -f
            - "2"
            - -g
            - "1"
            - -c
            - "1"
            - -n
            - "100"
    Worker:
      replicas: 2  # Number of worker nodes
      template:
        spec:
          containers:
          - image: public.ecr.aws/hpc-cloud/nccl-tests:latest
            imagePullPolicy: IfNotPresent
            name: nccl-worker
            volumeMounts:
            - name: shmem
              mountPath: /dev/shm
            resources:
              limits:
                nvidia.com/gpu: 1       # GPUs per node (1 for g5, 8 for p5)
                memory: 8000Mi
              requests:
                nvidia.com/gpu: 1
                memory: 8000Mi
          volumes:
          - name: shmem
            hostPath:
              path: /dev/shm
