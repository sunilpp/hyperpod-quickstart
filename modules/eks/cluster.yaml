AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Amazon EKS cluster for SageMaker HyperPod EKS orchestrator.
  Creates the EKS control plane, two private subnets for EKS managed
  components, and the required IAM roles.

Parameters:
  ResourceNamePrefix:
    Type: String
    Default: hyperpod

  VpcId:
    Type: String
  PrivateSubnetId:
    Type: String
    Description: HyperPod private subnet to include in EKS networking.
  NatGatewayId:
    Type: String
  SecurityGroupId:
    Type: String

  KubernetesVersion:
    Type: String
    Default: "1.31"
    AllowedValues: ["1.29", "1.30", "1.31"]

  HyperPodExecutionRoleArn:
    Type: String
    Default: ""
    Description: ARN of the HyperPod execution role to grant EKS access.

  EKSSubnet1CIDR:
    Type: String
    Default: 10.0.10.0/24
  EKSSubnet2CIDR:
    Type: String
    Default: 10.0.11.0/24

Conditions:
  HasHyperPodRole: !Not [!Equals [!Ref HyperPodExecutionRoleArn, ""]]

Resources:

  # -------------------------------------------------------------------------
  # EKS Subnets (2 AZs required for EKS control plane)
  # -------------------------------------------------------------------------
  EKSSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcId
      CidrBlock: !Ref EKSSubnet1CIDR
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${ResourceNamePrefix}-eks-subnet-1"
        - Key: kubernetes.io/role/internal-elb
          Value: "1"

  EKSSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VpcId
      CidrBlock: !Ref EKSSubnet2CIDR
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${ResourceNamePrefix}-eks-subnet-2"
        - Key: kubernetes.io/role/internal-elb
          Value: "1"

  EKSRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: !Sub "${ResourceNamePrefix}-eks-rtb"

  EKSDefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref EKSRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGatewayId

  EKSSubnet1RTAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref EKSSubnet1
      RouteTableId: !Ref EKSRouteTable

  EKSSubnet2RTAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref EKSSubnet2
      RouteTableId: !Ref EKSRouteTable

  # -------------------------------------------------------------------------
  # S3 Gateway Endpoint for EKS subnets (separate from networking stack)
  # -------------------------------------------------------------------------
  EKSS3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.s3"
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref EKSRouteTable

  # -------------------------------------------------------------------------
  # EKS Cluster IAM Role
  # -------------------------------------------------------------------------
  EKSClusterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ResourceNamePrefix}-eks-cluster-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      ManagedPolicyArns:
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/AmazonEKSClusterPolicy"
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/AmazonEKSVPCResourceController"

  # -------------------------------------------------------------------------
  # EKS Cluster
  # -------------------------------------------------------------------------
  EKSCluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: !Sub "${ResourceNamePrefix}-eks-cluster"
      Version: !Ref KubernetesVersion
      RoleArn: !GetAtt EKSClusterRole.Arn
      ResourcesVpcConfig:
        SubnetIds:
          - !Ref EKSSubnet1
          - !Ref EKSSubnet2
          - !Ref PrivateSubnetId
        SecurityGroupIds:
          - !Ref SecurityGroupId
        EndpointPublicAccess: true
        EndpointPrivateAccess: true
      AccessConfig:
        AuthenticationMode: API_AND_CONFIG_MAP
      Logging:
        ClusterLogging:
          EnabledTypes:
            - Type: api
            - Type: audit
            - Type: authenticator
      Tags:
        - Key: Name
          Value: !Sub "${ResourceNamePrefix}-eks-cluster"

  # -------------------------------------------------------------------------
  # EKS Access Entry for HyperPod execution role
  # Allows HyperPod nodes to register with the EKS cluster
  # -------------------------------------------------------------------------
  HyperPodAccessEntry:
    Type: AWS::EKS::AccessEntry
    Condition: HasHyperPodRole
    Properties:
      ClusterName: !Ref EKSCluster
      PrincipalArn: !Ref HyperPodExecutionRoleArn
      Type: HYPERPOD_LINUX

Outputs:
  ClusterArn:
    Description: ARN of the EKS cluster
    Value: !GetAtt EKSCluster.Arn

  ClusterName:
    Description: Name of the EKS cluster
    Value: !Ref EKSCluster

  ClusterEndpoint:
    Description: API server endpoint
    Value: !GetAtt EKSCluster.Endpoint

  ClusterSecurityGroupId:
    Description: Cluster-managed security group
    Value: !GetAtt EKSCluster.ClusterSecurityGroupId

  OIDCIssuer:
    Description: OIDC issuer URL for IRSA
    Value: !GetAtt EKSCluster.OpenIdConnectIssuerUrl
