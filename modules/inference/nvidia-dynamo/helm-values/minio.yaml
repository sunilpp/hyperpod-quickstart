# MinIO Helm values for NVIDIA Dynamo artifact storage
# Stores model artifacts and intermediate build outputs.
#
# Credentials are auto-generated by the Bitnami chart and stored
# in Kubernetes Secret 'dynamo-minio'. For production, create a
# pre-existing secret:
#   kubectl create secret generic dynamo-minio-creds \
#     --from-literal=root-user=$(openssl rand -base64 16) \
#     --from-literal=root-password=$(openssl rand -base64 24) \
#     -n dynamo-cloud
# Then set: auth.existingSecret: dynamo-minio-creds

auth:
  # Passwords auto-generated if not specified
  # existingSecret: dynamo-minio-creds
  rootUser: ""
  rootPassword: ""

provisioning:
  enabled: true
  buckets:
    - name: dynamo-artifacts

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: "1"
    memory: 2Gi

persistence:
  enabled: true
  size: 50Gi
