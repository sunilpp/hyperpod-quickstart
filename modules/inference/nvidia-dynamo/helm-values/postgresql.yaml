# PostgreSQL Helm values for NVIDIA Dynamo API Store
# Stores Dynamo deployment metadata and inference graph state.
#
# Credentials are auto-generated by the Bitnami chart and stored
# in Kubernetes Secret 'dynamo-postgresql'. To use a pre-existing
# secret, set auth.existingSecret instead.

auth:
  username: dynamo
  database: dynamo
  # Passwords are auto-generated if not specified and stored in
  # the release secret. For production, create a secret first:
  #   kubectl create secret generic dynamo-postgresql-creds \
  #     --from-literal=postgres-password=$(openssl rand -base64 24) \
  #     --from-literal=password=$(openssl rand -base64 24) \
  #     -n dynamo-cloud
  # Then uncomment:
  # existingSecret: dynamo-postgresql-creds

primary:
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
  persistence:
    enabled: true
    size: 20Gi

metrics:
  enabled: true
