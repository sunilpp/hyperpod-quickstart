AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Shared VPC networking stack for SageMaker HyperPod Quick Start.
  Creates a VPC with public and private subnets, NAT Gateway, VPC Flow Logs,
  and an S3 Gateway Endpoint. Used as a nested stack by all HyperPod
  orchestrator/accelerator combinations.

# ===========================================================================
# Parameters
# ===========================================================================
Parameters:
  ResourceNamePrefix:
    Type: String
    Default: hyperpod
    Description: Prefix applied to the Name tag of every resource.

  PrimaryAZ:
    Type: String
    Description: >
      Availability Zone ID (e.g. usw2-az2) for the public and primary
      private subnets. Must match the AZ where HyperPod capacity is available.

  BackupAZ:
    Type: String
    Default: ""
    Description: >
      Optional second AZ ID for a backup private subnet.
      Required by services like AWS Directory Service that need two AZs.
      Leave empty to skip.

# ===========================================================================
# Conditions
# ===========================================================================
Conditions:
  CreateBackupSubnet: !Not [!Equals [!Ref BackupAZ, ""]]

# ===========================================================================
# Resources
# ===========================================================================
Resources:

  # -------------------------------------------------------------------------
  # VPC
  # -------------------------------------------------------------------------
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${ResourceNamePrefix}-vpc"

  # Secondary CIDR for private subnets — large IP space for HyperPod ENIs
  VpcCidrBlockPrivate:
    Type: AWS::EC2::VPCCidrBlock
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.1.0.0/16

  # -------------------------------------------------------------------------
  # Internet Gateway
  # -------------------------------------------------------------------------
  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${ResourceNamePrefix}-igw"

  InternetGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  # -------------------------------------------------------------------------
  # Public Subnet
  # -------------------------------------------------------------------------
  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.0.0/24
      AvailabilityZoneId: !Ref PrimaryAZ
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${ResourceNamePrefix}-public-subnet"

  # -------------------------------------------------------------------------
  # Private Subnet — /16 for HyperPod instances (65k IPs)
  # -------------------------------------------------------------------------
  PrivateSubnet:
    Type: AWS::EC2::Subnet
    DependsOn: VpcCidrBlockPrivate
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.1.0.0/16
      AvailabilityZoneId: !Ref PrimaryAZ
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${ResourceNamePrefix}-private-subnet"

  # -------------------------------------------------------------------------
  # Backup Private Subnet (optional, second AZ)
  # -------------------------------------------------------------------------
  BackupSubnet:
    Type: AWS::EC2::Subnet
    Condition: CreateBackupSubnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZoneId: !Ref BackupAZ
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${ResourceNamePrefix}-backup-private-subnet"

  # -------------------------------------------------------------------------
  # NAT Gateway (in public subnet)
  # -------------------------------------------------------------------------
  NatGatewayEIP:
    Type: AWS::EC2::EIP
    DependsOn: InternetGatewayAttachment
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub "${ResourceNamePrefix}-nat-eip"

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatGatewayEIP.AllocationId
      SubnetId: !Ref PublicSubnet
      Tags:
        - Key: Name
          Value: !Sub "${ResourceNamePrefix}-nat-gw"

  # -------------------------------------------------------------------------
  # Public Route Table
  # -------------------------------------------------------------------------
  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${ResourceNamePrefix}-public-rtb"

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: InternetGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet
      RouteTableId: !Ref PublicRouteTable

  # -------------------------------------------------------------------------
  # Private Route Table
  # -------------------------------------------------------------------------
  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: !Sub "${ResourceNamePrefix}-private-rtb"

  PrivateDefaultRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet
      RouteTableId: !Ref PrivateRouteTable

  BackupSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Condition: CreateBackupSubnet
    Properties:
      SubnetId: !Ref BackupSubnet
      RouteTableId: !Ref PrivateRouteTable

  # -------------------------------------------------------------------------
  # S3 Gateway VPC Endpoint — avoids NAT charges for S3 traffic
  # -------------------------------------------------------------------------
  S3GatewayEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VPC
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.s3"
      VpcEndpointType: Gateway
      RouteTableIds:
        - !Ref PrivateRouteTable

  # -------------------------------------------------------------------------
  # VPC Flow Logs
  # -------------------------------------------------------------------------
  FlowLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/vpc/flowlogs/${ResourceNamePrefix}-vpc"
      RetentionInDays: 14

  FlowLogRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ResourceNamePrefix}-vpc-flow-log-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FlowLogCloudWatchAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource:
                  - !GetAtt FlowLogGroup.Arn
                  - !Sub "${FlowLogGroup.Arn}:*"

  VPCFlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      ResourceId: !Ref VPC
      ResourceType: VPC
      TrafficType: ALL
      LogDestinationType: cloud-watch-logs
      LogGroupName: !Ref FlowLogGroup
      DeliverLogsPermissionArn: !GetAtt FlowLogRole.Arn
      Tags:
        - Key: Name
          Value: !Sub "${ResourceNamePrefix}-vpc-flow-log"

# ===========================================================================
# Outputs
# ===========================================================================
Outputs:
  VpcId:
    Description: ID of the VPC
    Value: !Ref VPC

  PrivateSubnetId:
    Description: ID of the primary private subnet (HyperPod instances)
    Value: !Ref PrivateSubnet

  PublicSubnetId:
    Description: ID of the public subnet (NAT Gateway)
    Value: !Ref PublicSubnet

  BackupSubnetId:
    Condition: CreateBackupSubnet
    Description: ID of the backup private subnet in the second AZ
    Value: !Ref BackupSubnet

  NatGatewayId:
    Description: ID of the NAT Gateway
    Value: !Ref NatGateway
