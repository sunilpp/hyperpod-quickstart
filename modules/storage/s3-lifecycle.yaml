AWSTemplateFormatVersion: "2010-09-09"
Description: >
  S3 bucket for storing HyperPod lifecycle scripts.
  Scripts are uploaded to this bucket and referenced by the HyperPod cluster
  during node initialization.

Parameters:
  ResourceNamePrefix:
    Type: String
    Default: hyperpod
    Description: Prefix applied to resource names.

  SageMakerRoleArn:
    Type: String
    Default: ""
    Description: ARN of the SageMaker execution role (for bucket policy).

  LifecycleScriptSourceBucket:
    Type: String
    Description: S3 bucket containing the lifecycle scripts to copy.

  LifecycleScriptSourcePrefix:
    Type: String
    Description: S3 key prefix for lifecycle scripts in the source bucket.

Conditions:
  HasSageMakerRole: !Not [!Equals [!Ref SageMakerRoleArn, ""]]

Resources:
  LifecycleScriptsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    Properties:
      BucketName: !Sub "${ResourceNamePrefix}-lifecycle-${AWS::AccountId}-${AWS::Region}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Name
          Value: !Sub "${ResourceNamePrefix}-lifecycle-scripts"

  BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: HasSageMakerRole
    Properties:
      Bucket: !Ref LifecycleScriptsBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref SageMakerRoleArn
            Action:
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !GetAtt LifecycleScriptsBucket.Arn
              - !Sub "${LifecycleScriptsBucket.Arn}/*"

  # -------------------------------------------------------------------------
  # Upload lifecycle scripts from source bucket to lifecycle bucket
  # -------------------------------------------------------------------------
  UploadFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      # No RoleName — let CloudFormation auto-generate to avoid orphan conflicts
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - !Sub "arn:${AWS::Partition}:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole"
      Policies:
        - PolicyName: S3CopyAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:${AWS::Partition}:s3:::${LifecycleScriptSourceBucket}"
                  - !Sub "arn:${AWS::Partition}:s3:::${LifecycleScriptSourceBucket}/*"
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:DeleteObjectVersion
                  - s3:ListBucket
                  - s3:ListBucketVersions
                Resource:
                  - !GetAtt LifecycleScriptsBucket.Arn
                  - !Sub "${LifecycleScriptsBucket.Arn}/*"

  UploadFunction:
    Type: AWS::Lambda::Function
    Properties:
      # No FunctionName — let CloudFormation auto-generate to avoid orphan conflicts
      Runtime: python3.12
      Handler: index.handler
      Timeout: 120
      Role: !GetAtt UploadFunctionRole.Arn
      Code:
        ZipFile: |
          import json
          import logging
          import boto3
          import cfnresponse

          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          s3 = boto3.client("s3")

          def handler(event, context):
              logger.info(json.dumps(event))
              try:
                  props = event.get("ResourceProperties", {})
                  src_bucket = props["SourceBucket"]
                  src_prefix = props["SourcePrefix"].rstrip("/") + "/"
                  dst_bucket = props["DestBucket"]
                  dst_prefix = props.get("DestPrefix", "lifecycle-scripts").rstrip("/") + "/"

                  if event["RequestType"] in ("Create", "Update"):
                      resp = s3.list_objects_v2(Bucket=src_bucket, Prefix=src_prefix)
                      copied = 0
                      for obj in resp.get("Contents", []):
                          src_key = obj["Key"]
                          filename = src_key[len(src_prefix):]
                          if not filename:
                              continue
                          dst_key = dst_prefix + filename
                          s3.copy_object(
                              CopySource={"Bucket": src_bucket, "Key": src_key},
                              Bucket=dst_bucket, Key=dst_key
                          )
                          logger.info(f"Copied {src_key} -> s3://{dst_bucket}/{dst_key}")
                          copied += 1
                      cfnresponse.send(event, context, cfnresponse.SUCCESS,
                                       {"CopiedFiles": str(copied)})

                  elif event["RequestType"] == "Delete":
                      # Empty the entire bucket (including versioned objects)
                      # so CloudFormation can delete the bucket resource
                      bucket = dst_bucket
                      logger.info(f"Emptying bucket {bucket}")
                      paginator = s3.get_paginator("list_object_versions")
                      for page in paginator.paginate(Bucket=bucket):
                          objects = []
                          for v in page.get("Versions", []):
                              objects.append({"Key": v["Key"], "VersionId": v["VersionId"]})
                          for d in page.get("DeleteMarkers", []):
                              objects.append({"Key": d["Key"], "VersionId": d["VersionId"]})
                          if objects:
                              s3.delete_objects(Bucket=bucket, Delete={"Objects": objects})
                              logger.info(f"Deleted {len(objects)} objects/versions")
                      cfnresponse.send(event, context, cfnresponse.SUCCESS, {})

              except Exception as e:
                  logger.error(str(e), exc_info=True)
                  cfnresponse.send(event, context, cfnresponse.FAILED, {"Error": str(e)})

  UploadLifecycleScripts:
    Type: Custom::LifecycleUpload
    DependsOn: LifecycleScriptsBucket
    Properties:
      ServiceToken: !GetAtt UploadFunction.Arn
      SourceBucket: !Ref LifecycleScriptSourceBucket
      SourcePrefix: !Ref LifecycleScriptSourcePrefix
      DestBucket: !Ref LifecycleScriptsBucket
      DestPrefix: lifecycle-scripts

Outputs:
  BucketName:
    Description: Name of the lifecycle scripts S3 bucket
    Value: !Ref LifecycleScriptsBucket

  BucketArn:
    Description: ARN of the lifecycle scripts S3 bucket
    Value: !GetAtt LifecycleScriptsBucket.Arn
