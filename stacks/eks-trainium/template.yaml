AWSTemplateFormatVersion: "2010-09-09"
Description: >
  HyperPod Quick Start: EKS + AWS Trainium.
  Deploys a complete SageMaker HyperPod cluster with Amazon EKS orchestrator
  and Trainium instances for cost-efficient PyTorch training.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Cluster Configuration
        Parameters:
          - ClusterName
          - ClusterSize
          - AvailabilityZoneId
          - KubernetesVersion
      - Label:
          default: Advanced - Instance Configuration
        Parameters:
          - WorkerInstanceType
      - Label:
          default: Features
        Parameters:
          - EnableObservability
          - EnableValidation
          - RunBenchmarks
      - Label:
          default: Template Location
        Parameters:
          - TemplateBaseUrl

Parameters:
  ClusterName:
    Type: String
    Default: my-hyperpod-eks-trn
    AllowedPattern: ^[a-zA-Z0-9]([a-zA-Z0-9-]*[a-zA-Z0-9])?$
    MaxLength: 63

  ClusterSize:
    Type: String
    Default: small
    AllowedValues: [small, medium, large]

  AvailabilityZoneId:
    Type: String
    Default: usw2-az2
    AllowedPattern: ^[a-z]{3,4}[0-9]-az[0-9]$

  KubernetesVersion:
    Type: String
    Default: "1.31"
    AllowedValues: ["1.29", "1.30", "1.31"]

  WorkerInstanceType:
    Type: String
    Default: ml.trn1.32xlarge

  SSHPublicKey:
    Type: String
    Default: ""
    Description: >
      Your SSH public key (e.g., ssh-rsa AAAAB3Nz...). Added to authorized_keys
      on all nodes. Leave empty to use SSM Session Manager only.

  ExistingIAMRoleArn:
    Type: String
    Default: ""
    Description: ARN of an existing IAM role. Leave empty to create a new one.

  EnableObservability:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]

  EnableValidation:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]

  RunBenchmarks:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]

  TemplateBaseUrl:
    Type: String
    Default: ""

Mappings:
  ClusterSizeMap:
    small:
      WorkerCount: "2"
      FSxCapacity: "1200"
      EBSVolume: "500"
    medium:
      WorkerCount: "8"
      FSxCapacity: "4800"
      EBSVolume: "500"
    large:
      WorkerCount: "32"
      FSxCapacity: "14400"
      EBSVolume: "1000"

Conditions:
  HasSSHKey: !Not [!Equals [!Ref SSHPublicKey, ""]]
  ObservabilityEnabled: !Equals [!Ref EnableObservability, "true"]
  ValidationEnabled: !Equals [!Ref EnableValidation, "true"]
  BenchmarksEnabled: !Equals [!Ref RunBenchmarks, "true"]

Resources:
  NetworkingStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "${TemplateBaseUrl}/networking/template.yaml"
      Parameters:
        ResourceNamePrefix: !Ref ClusterName
        PrimaryAZ: !Ref AvailabilityZoneId

  SecurityStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "${TemplateBaseUrl}/security/template.yaml"
      Parameters:
        ResourceNamePrefix: !Ref ClusterName
        VpcId: !GetAtt NetworkingStack.Outputs.VpcId

  EKSStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "${TemplateBaseUrl}/eks/cluster.yaml"
      Parameters:
        ResourceNamePrefix: !Ref ClusterName
        VpcId: !GetAtt NetworkingStack.Outputs.VpcId
        PrivateSubnetId: !GetAtt NetworkingStack.Outputs.PrivateSubnetId
        NatGatewayId: !GetAtt NetworkingStack.Outputs.NatGatewayId
        SecurityGroupId: !GetAtt SecurityStack.Outputs.SecurityGroupId
        KubernetesVersion: !Ref KubernetesVersion

  EKSAddonsStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "${TemplateBaseUrl}/eks/addons.yaml"
      Parameters:
        ResourceNamePrefix: !Ref ClusterName
        ClusterName: !GetAtt EKSStack.Outputs.ClusterName

  StorageStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "${TemplateBaseUrl}/storage/fsx-lustre.yaml"
      Parameters:
        ResourceNamePrefix: !Ref ClusterName
        SubnetId: !GetAtt NetworkingStack.Outputs.PrivateSubnetId
        SecurityGroupId: !GetAtt SecurityStack.Outputs.SecurityGroupId
        StorageCapacityGiB: !FindInMap [ClusterSizeMap, !Ref ClusterSize, FSxCapacity]

  S3Stack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "${TemplateBaseUrl}/storage/s3-lifecycle.yaml"
      Parameters:
        ResourceNamePrefix: !Ref ClusterName

  IAMStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: !Sub "${TemplateBaseUrl}/iam/template.yaml"
      Parameters:
        ResourceNamePrefix: !Ref ClusterName
        LifecycleScriptsBucket: !GetAtt S3Stack.Outputs.BucketName
        ExistingRoleArn: !Ref ExistingIAMRoleArn
        PrometheusWorkspaceArn: !If
          - ObservabilityEnabled
          - !GetAtt ObservabilityStack.Outputs.PrometheusWorkspaceArn
          - ""

  SSHKeyParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/hyperpod/${ClusterName}/ssh-public-key"
      Type: String
      Value: !If
        - HasSSHKey
        - !Ref SSHPublicKey
        - "none"
      Description: User SSH public key for cluster node access

  HyperPodStack:
    Type: AWS::CloudFormation::Stack
    DependsOn: EKSAddonsStack
    Properties:
      TemplateURL: !Sub "${TemplateBaseUrl}/hyperpod/cluster.yaml"
      Parameters:
        ResourceNamePrefix: !Ref ClusterName
        ClusterName: !Ref ClusterName
        Orchestrator: eks
        EKSClusterArn: !GetAtt EKSStack.Outputs.ClusterArn
        SecurityGroupId: !GetAtt SecurityStack.Outputs.SecurityGroupId
        SubnetId: !GetAtt NetworkingStack.Outputs.PrivateSubnetId
        ExecutionRoleArn: !GetAtt IAMStack.Outputs.RoleArn
        LifecycleS3Bucket: !GetAtt S3Stack.Outputs.BucketName
        LifecycleS3KeyPrefix: lifecycle-scripts
        WorkerInstanceGroupName: worker-group
        WorkerInstanceType: !Ref WorkerInstanceType
        WorkerInstanceCount: !FindInMap [ClusterSizeMap, !Ref ClusterSize, WorkerCount]
        WorkerEBSVolumeSize: !FindInMap [ClusterSizeMap, !Ref ClusterSize, EBSVolume]
        WorkerLifecycleScript: on_create.sh
        CreateControllerGroup: "false"

  ObservabilityStack:
    Type: AWS::CloudFormation::Stack
    Condition: ObservabilityEnabled
    Properties:
      TemplateURL: !Sub "${TemplateBaseUrl}/observability/trainium-observability.yaml"
      Parameters:
        ResourceNamePrefix: !Ref ClusterName

  ValidationStack:
    Type: AWS::CloudFormation::Stack
    Condition: ValidationEnabled
    Properties:
      TemplateURL: !Sub "${TemplateBaseUrl}/validation/template.yaml"
      Parameters:
        ResourceNamePrefix: !Ref ClusterName
        ClusterName: !GetAtt HyperPodStack.Outputs.ClusterName
        ClusterArn: !GetAtt HyperPodStack.Outputs.ClusterArn
        SubnetId: !GetAtt NetworkingStack.Outputs.PrivateSubnetId
        SecurityGroupId: !GetAtt SecurityStack.Outputs.SecurityGroupId
        ExpectedWorkerCount: !FindInMap [ClusterSizeMap, !Ref ClusterSize, WorkerCount]

  BenchmarkStack:
    Type: AWS::CloudFormation::Stack
    Condition: BenchmarksEnabled
    Properties:
      TemplateURL: !Sub "${TemplateBaseUrl}/benchmarking/template.yaml"
      Parameters:
        ResourceNamePrefix: !Ref ClusterName
        ClusterName: !GetAtt HyperPodStack.Outputs.ClusterName
        ClusterArn: !GetAtt HyperPodStack.Outputs.ClusterArn
        ResultsBucket: !GetAtt S3Stack.Outputs.BucketName
        ComputeType: trainium
        Orchestrator: eks

Outputs:
  ClusterArn:
    Value: !GetAtt HyperPodStack.Outputs.ClusterArn
  ClusterName:
    Value: !GetAtt HyperPodStack.Outputs.ClusterName
  EKSClusterName:
    Value: !GetAtt EKSStack.Outputs.ClusterName
  EKSClusterEndpoint:
    Value: !GetAtt EKSStack.Outputs.ClusterEndpoint
  VpcId:
    Value: !GetAtt NetworkingStack.Outputs.VpcId
  FSxDnsName:
    Value: !GetAtt StorageStack.Outputs.FileSystemDnsName
  LifecycleScriptsBucket:
    Value: !GetAtt S3Stack.Outputs.BucketName
  GrafanaDashboardUrl:
    Condition: ObservabilityEnabled
    Value: !GetAtt ObservabilityStack.Outputs.GrafanaWorkspaceUrl
  ValidationResult:
    Condition: ValidationEnabled
    Value: !GetAtt ValidationStack.Outputs.ValidationResult
  BenchmarkResults:
    Condition: BenchmarksEnabled
    Value: !GetAtt BenchmarkStack.Outputs.ResultsS3Path
  KubeconfigCommand:
    Description: Run this to configure kubectl
    Value: !Sub "aws eks update-kubeconfig --name ${EKSStack.Outputs.ClusterName} --region ${AWS::Region}"
