AWSTemplateFormatVersion: "2010-09-09"
Description: >
  HyperPod Quick Start: Slurm + NVIDIA GPU.
  Deploys a complete SageMaker HyperPod cluster with Slurm orchestrator
  and NVIDIA GPU instances, including networking, shared storage,
  monitoring, and post-deploy validation.

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: Cluster Configuration
        Parameters:
          - ClusterName
          - ClusterSize
          - AvailabilityZoneId
      - Label:
          default: SSH Access
        Parameters:
          - SSHPublicKey
      - Label:
          default: Advanced - Instance Configuration
        Parameters:
          - WorkerInstanceType
          - ControllerInstanceType
          - ExistingIAMRoleArn
      - Label:
          default: Features
        Parameters:
          - EnableObservability
          - EnableValidation
          - RunBenchmarks
      - Label:
          default: Lifecycle Scripts Source
        Parameters:
          - LifecycleScriptSourceBucket
          - LifecycleScriptSourcePrefix

Parameters:
  ClusterName:
    Type: String
    Default: my-hyperpod
    Description: Name for your HyperPod cluster.
    AllowedPattern: ^[a-zA-Z0-9]([a-zA-Z0-9-]*[a-zA-Z0-9])?$
    MaxLength: 63

  ClusterSize:
    Type: String
    Default: small
    AllowedValues: [small, medium, large]
    Description: >
      small = 2 workers + 1.2TB storage.
      medium = 8 workers + 4.8TB storage.
      large = 32 workers + 14.4TB storage.

  AvailabilityZoneId:
    Type: String
    Default: usw2-az2
    Description: AZ with capacity for your instance type (e.g., usw2-az2).
    AllowedPattern: ^[a-z]{3,4}[0-9]-az[0-9]$

  WorkerInstanceType:
    Type: String
    Default: ml.p5.48xlarge
    Description: Instance type for GPU worker nodes.

  ControllerInstanceType:
    Type: String
    Default: ml.m5.2xlarge
    Description: Instance type for Slurm controller (head) node.

  SSHPublicKey:
    Type: String
    Default: ""
    Description: >
      Your SSH public key (e.g., ssh-rsa AAAAB3Nz...). If provided, it will be
      added to authorized_keys on all cluster nodes so you can SSH directly.
      Leave empty to use SSM Session Manager only.

  ExistingIAMRoleArn:
    Type: String
    Default: ""
    Description: >
      ARN of an existing IAM role for HyperPod. Leave empty to create a new one.
      Use this if your organization requires pre-approved IAM roles.

  EnableObservability:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Deploy Prometheus + Grafana monitoring dashboards.

  EnableValidation:
    Type: String
    Default: "true"
    AllowedValues: ["true", "false"]
    Description: Run post-deployment health checks.

  RunBenchmarks:
    Type: String
    Default: "false"
    AllowedValues: ["true", "false"]
    Description: Run NCCL performance benchmarks after deployment.

  LifecycleScriptSourceBucket:
    Type: String
    Description: S3 bucket where lifecycle scripts were uploaded by deploy.sh.

  LifecycleScriptSourcePrefix:
    Type: String
    Description: S3 key prefix for lifecycle scripts in the source bucket.

Mappings:
  ClusterSizeMap:
    small:
      WorkerCount: "2"
      FSxCapacity: "1200"
      EBSVolume: "500"
    medium:
      WorkerCount: "8"
      FSxCapacity: "4800"
      EBSVolume: "500"
    large:
      WorkerCount: "32"
      FSxCapacity: "14400"
      EBSVolume: "1000"

Conditions:
  HasSSHKey: !Not [!Equals [!Ref SSHPublicKey, ""]]
  ObservabilityEnabled: !Equals [!Ref EnableObservability, "true"]
  ValidationEnabled: !Equals [!Ref EnableValidation, "true"]
  BenchmarksEnabled: !Equals [!Ref RunBenchmarks, "true"]

Resources:

  # =========================================================================
  # Networking
  # =========================================================================
  NetworkingStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ../../modules/networking/template.yaml
      Parameters:
        ResourceNamePrefix: !Ref ClusterName
        PrimaryAZ: !Ref AvailabilityZoneId

  # =========================================================================
  # Security
  # =========================================================================
  SecurityStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ../../modules/security/template.yaml
      Parameters:
        ResourceNamePrefix: !Ref ClusterName
        VpcId: !GetAtt NetworkingStack.Outputs.VpcId

  # =========================================================================
  # Storage - FSx Lustre
  # =========================================================================
  StorageStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ../../modules/storage/fsx-lustre.yaml
      Parameters:
        ResourceNamePrefix: !Ref ClusterName
        SubnetId: !GetAtt NetworkingStack.Outputs.PrivateSubnetId
        SecurityGroupId: !GetAtt SecurityStack.Outputs.SecurityGroupId
        StorageCapacityGiB: !FindInMap [ClusterSizeMap, !Ref ClusterSize, FSxCapacity]

  # =========================================================================
  # Storage - S3 Lifecycle Scripts Bucket
  # =========================================================================
  S3Stack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ../../modules/storage/s3-lifecycle.yaml
      Parameters:
        ResourceNamePrefix: !Ref ClusterName
        LifecycleScriptSourceBucket: !Ref LifecycleScriptSourceBucket
        LifecycleScriptSourcePrefix: !Ref LifecycleScriptSourcePrefix

  # =========================================================================
  # IAM
  # =========================================================================
  IAMStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ../../modules/iam/template.yaml
      Parameters:
        ResourceNamePrefix: !Ref ClusterName
        LifecycleScriptsBucket: !GetAtt S3Stack.Outputs.BucketName
        ExistingRoleArn: !Ref ExistingIAMRoleArn
        PrometheusWorkspaceArn: !If
          - ObservabilityEnabled
          - !GetAtt ObservabilityStack.Outputs.PrometheusWorkspaceArn
          - ""

  # =========================================================================
  # SSH Key (stored in SSM for lifecycle scripts to retrieve)
  # =========================================================================
  SSHKeyParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/hyperpod/${ClusterName}/ssh-public-key"
      Type: String
      Value: !If
        - HasSSHKey
        - !Ref SSHPublicKey
        - "none"
      Description: User SSH public key for cluster node access

  # =========================================================================
  # HyperPod Cluster
  # =========================================================================
  HyperPodStack:
    Type: AWS::CloudFormation::Stack
    Properties:
      TemplateURL: ../../modules/hyperpod/cluster.yaml
      Parameters:
        ResourceNamePrefix: !Ref ClusterName
        ClusterName: !Ref ClusterName
        Orchestrator: slurm
        SecurityGroupId: !GetAtt SecurityStack.Outputs.SecurityGroupId
        SubnetId: !GetAtt NetworkingStack.Outputs.PrivateSubnetId
        ExecutionRoleArn: !GetAtt IAMStack.Outputs.RoleArn
        LifecycleS3Bucket: !GetAtt S3Stack.Outputs.BucketName
        LifecycleS3KeyPrefix: lifecycle-scripts
        WorkerInstanceGroupName: worker-group
        WorkerInstanceType: !Ref WorkerInstanceType
        WorkerInstanceCount: !FindInMap [ClusterSizeMap, !Ref ClusterSize, WorkerCount]
        WorkerEBSVolumeSize: !FindInMap [ClusterSizeMap, !Ref ClusterSize, EBSVolume]
        WorkerLifecycleScript: on_create.sh
        CreateControllerGroup: "true"
        ControllerInstanceType: !Ref ControllerInstanceType

  # =========================================================================
  # Observability (optional)
  # =========================================================================
  ObservabilityStack:
    Type: AWS::CloudFormation::Stack
    Condition: ObservabilityEnabled
    Properties:
      TemplateURL: ../../modules/observability/gpu-observability.yaml
      Parameters:
        ResourceNamePrefix: !Ref ClusterName

  # =========================================================================
  # Validation (optional)
  # =========================================================================
  ValidationStack:
    Type: AWS::CloudFormation::Stack
    Condition: ValidationEnabled
    Properties:
      TemplateURL: ../../modules/validation/template.yaml
      Parameters:
        ResourceNamePrefix: !Ref ClusterName
        ClusterName: !GetAtt HyperPodStack.Outputs.ClusterName
        ClusterArn: !GetAtt HyperPodStack.Outputs.ClusterArn
        SubnetId: !GetAtt NetworkingStack.Outputs.PrivateSubnetId
        SecurityGroupId: !GetAtt SecurityStack.Outputs.SecurityGroupId
        ExpectedWorkerCount: !FindInMap [ClusterSizeMap, !Ref ClusterSize, WorkerCount]

  # =========================================================================
  # Benchmarking (optional)
  # =========================================================================
  BenchmarkStack:
    Type: AWS::CloudFormation::Stack
    Condition: BenchmarksEnabled
    Properties:
      TemplateURL: ../../modules/benchmarking/template.yaml
      Parameters:
        ResourceNamePrefix: !Ref ClusterName
        ClusterName: !GetAtt HyperPodStack.Outputs.ClusterName
        ClusterArn: !GetAtt HyperPodStack.Outputs.ClusterArn
        ResultsBucket: !GetAtt S3Stack.Outputs.BucketName
        ComputeType: gpu
        Orchestrator: slurm

# =========================================================================
# Outputs
# =========================================================================
Outputs:
  ClusterArn:
    Description: HyperPod cluster ARN
    Value: !GetAtt HyperPodStack.Outputs.ClusterArn

  ClusterName:
    Description: HyperPod cluster name
    Value: !GetAtt HyperPodStack.Outputs.ClusterName

  VpcId:
    Description: VPC ID
    Value: !GetAtt NetworkingStack.Outputs.VpcId

  PrivateSubnetId:
    Description: Private subnet ID
    Value: !GetAtt NetworkingStack.Outputs.PrivateSubnetId

  FSxDnsName:
    Description: FSx Lustre filesystem DNS name
    Value: !GetAtt StorageStack.Outputs.FileSystemDnsName

  FSxMountName:
    Description: FSx Lustre mount name
    Value: !GetAtt StorageStack.Outputs.MountName

  LifecycleScriptsBucket:
    Description: S3 bucket for lifecycle scripts
    Value: !GetAtt S3Stack.Outputs.BucketName

  GrafanaDashboardUrl:
    Condition: ObservabilityEnabled
    Description: Grafana dashboard URL
    Value: !GetAtt ObservabilityStack.Outputs.GrafanaWorkspaceUrl

  PrometheusEndpoint:
    Condition: ObservabilityEnabled
    Description: Prometheus remote write endpoint
    Value: !GetAtt ObservabilityStack.Outputs.PrometheusEndpoint

  ValidationResult:
    Condition: ValidationEnabled
    Description: Post-deploy validation result
    Value: !GetAtt ValidationStack.Outputs.ValidationResult

  BenchmarkResults:
    Condition: BenchmarksEnabled
    Description: S3 path to benchmark results
    Value: !GetAtt BenchmarkStack.Outputs.ResultsS3Path
